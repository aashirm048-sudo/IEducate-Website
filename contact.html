<html lang="en">
<head>

    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .container{
            height: 600px;
            background-color: silver;
        }
        h1{
            text-decoration: underline;
        }
        input{
            position: relative;
            top: 60px;
           margin: 10px;
           height: 30px;
           width: 300px;
           border: 2px solid black;
        }
       button{
        font-size: 20px;
        border: 2px solid black;
        background-color: transparent;
        color: black;
         position: relative;
         top: -300px;
         left: 500px;
         border-radius: 20px;
         height: 40px;
         width: 90px;
       }
       .parent{
        height: 40px;
        background-color: black;
        color: white;
        position: relative;
        top: -40px;
        text-align: center;
        align-items: center;
       }
    </style>
</head>
<body>
    <div class="container"><center><h1>Contact Us:-</h1></center>
      <center><input type="text" placeholder="Enter Your name"></center>    
      <center><input type="text" placeholder="Enter Your PhoneNo"></center>    
      <center><input type="text" placeholder="Elaborate Your Concern">
      </div><button>Submit</button></center>  
      <div class="parent"><center>Copyright © 2027 iEducate.com - All rights reserved</center></div> 
    </div>

</html>
